global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    scheme: https
    static_configs:
      - targets: ['localhost:9090']
    tls_config:
      insecure_skip_verify: true

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'tripborder-backend' 
    scheme: https
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal']   # ← CHANGE PORT if needed
        labels:
          app: 'tripborder-backend'
    tls_config:
      insecure_skip_verify: true
