# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
networks:
  backend-network:
    name: tripborder-backend-network
    external: true

secrets:
  nominatim_password:
    file: ./secrets/nominatim_password.txt
  db_password:
    file: ./secrets/db_password.txt
  tunnel_token:
    file: ./secrets/tunnel_token.txt

services:
  server:
    # migrate to latest database schema and seed file
    command: sh -c "npx knex migrate:latest && npx knex seed:run --knexfile knexfile.js && npm run server" 
    # restart: unless-stopped
    build: .
    expose:
    - "7776"
    volumes:
      - ./ssl:/ssl
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_USER: nientaiho
      DB_NAME: tripborderdevdb
      SSL_CERTIFICATE_PATH: /ssl/tripborderbackend-cert.pem
      SSL_PRIVATE_KEY_PATH: /ssl/tripborderbackend-key.pem
    env_file:
      - .env.development
    secrets:
      - db_password
    networks:
      - backend-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    # restart: unless-stopped
    environment:
      POSTGRES_USER: nientaiho
      POSTGRES_DB: tripborderdevdb
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - backend-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nientaiho", "-d", "tripborderdevdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    # restart: unless-stopped
    ports: 
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - backend-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - server

  # Run below command if permission denied for external drive
  # dot_clean -m /Volumes/SSDName/nominatim-data
  nominatim:
    image: mediagis/nominatim:5.2  # Pulls pre-built Nominatim with osm2pgsql/PostgreSQL (stable version; avoids manual builds).
    volumes:
      - nominatim-pg-data:/var/lib/postgresql/16/main  # Persists DB data (~500GB+ for planet; maps host path to container for durability).
      - nominatim-flatnode:/nominatim/flatnode  # Flatnode storage for efficient import (reduces RAM needs during osm2pgsql load).
      - nominatim-share:/nominatim/share  # Hosts PBF file (e.g., download planet-latest.osm.pbf here externally via wget).
      - ${HOME}/nominatim-data/share:/nominatim/share
    shm_size: '16g'
    mem_limit: '16g'
    cpus: 8
    # restart: unless-stopped
    environment:
      - PBF_PATH=/nominatim/share/TW-JP-US-regions.osm.pbf  # Path to OSM data inside container (example: points to downloaded planet file for full import).
      - THREADS=8  # Parallel threads for import (match your CPU cores; speeds up osm2pgsql processing, e.g., 16 cores halve time).
      - IMPORT_STYLE=extratags # Minimal import style (faster, lower resources; use 'extratags' for more data if needed).
        # admin: Only import administrative boundaries and places.
        # street: Like the admin style but also adds streets.
        # address: Import all data necessary to compute addresses down to house number level.
        # full: Default style that also includes points of interest.
        # extratags: Like the full style but also adds most of the OSM tags into the extratags column.
      - IMPORT_WIKIPEDIA=false
    entrypoint:
      - /bin/sh  #Arg 1: Shell binary
      - -c  # Arg 2: Flag to treat next arg as a command string (prevents direct arg parsing).
      - export NOMINATIM_PASSWORD=$(cat /run/secrets/nominatim_password) && exec /app/start.sh  # Arg 3: Command string to execute.
    secrets:
      - nominatim_password
    networks:
      - backend-network  # Joins existing network (allows proxy_pass by service name, e.g., http://nominatim:8080).
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - server
      - db
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-web.yml:/etc/prometheus/prometheus-web.yml
      - ./ssl/prometheus:/etc/prometheus/certs
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.config.file=/etc/prometheus/prometheus-web.yml'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'   # allows reload without restart
      - '--web.external-url=https://localhost'
    ports:
      - "9090:9090"
    restart: unless-stopped
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ssl/grafana:/etc/grafana/certs:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=dev   # Change this!
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_CERT_FILE=/etc/grafana/certs/grafana.crt
      - GF_SERVER_CERT_KEY=/etc/grafana/certs/grafana.key
      - GF_SERVER_ROOT_URL=https://localhost/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    restart: unless-stopped
  node-exporter:   # bonus: monitors your Mac's CPU/RAM/disk
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped

volumes:
  nominatim-pg-data:  # nominatim PostgreSQL
  nominatim-flatnode:  # nominatim flatnode
  nominatim-share:     # nominatim share
  postgres_data_dev: # TripBorder PostgreSQL
  prometheus_data:
  grafana_data:
