name: Production CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (prod)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./TripBorderBackend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'TripBorderBackend/package-lock.json'

      - name: Install deps (reproducible CI)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (TDD safety net)
        run: npm run test

      - name: Docker Compose validate (if present)
        run: |
          for f in compose*.yml docker-compose*.yml; do
            if [ -f "$f" ]; then
              docker compose -f "$f" config --quiet && echo "✅ $f valid" || echo "⚠️ $f issue"
            fi
          done